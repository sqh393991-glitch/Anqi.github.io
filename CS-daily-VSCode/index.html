<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>CS Daily Climb</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #050505;
        --ink: #f4efe7;
        --muted: #b8aa96;
        --red: #d83226;
        --amber: #f6c85f;
        --green: #a4cf73;
        --blue: #6db2d8;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Microsoft YaHei", sans-serif;
        height: 100%;
        margin: 0;
        overflow: hidden;
      }

      body {
        align-items: center;
        display: flex;
        justify-content: center;
      }

      main {
        align-items: center;
        display: grid;
        height: 100dvh;
        justify-items: center;
        position: relative;
        width: 100vw;
      }

      canvas {
        display: block;
        height: auto !important;
        max-height: 100dvh;
        width: min(100vw, calc(100dvh * 960 / 540), 960px) !important;
      }

      .loading {
        color: var(--muted);
        font-size: 14px;
        letter-spacing: 0;
        position: absolute;
        text-align: center;
        top: 16px;
        width: 100%;
        z-index: 2;
      }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.4/p5.min.js"></script>
    <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  </head>
  <body>
    <main>
        <div class="loading" id="loading">Loading game...</div>
    </main>

    <script>
      let handPose;
      let video;
      let hands = [];
      let bgImg;
      let heroImg;
      let monsterImgs = [];

      const CANVAS_W = 960;
      const CANVAS_H = 540;
      const VIEW_W = 544;
      const VIEW_H = 540;
      const GAME_X = (CANVAS_W - VIEW_W) / 2;
      const SOURCE_W = 1836;
      const SOURCE_H = 7078;
      const WORLD_H = Math.round(VIEW_W * SOURCE_H / SOURCE_W);
      const BG_SCALE = 1;
      const BG_W = VIEW_W * BG_SCALE;
      const BG_X = (VIEW_W - BG_W) / 2;

      const ROUTE_POINTS = [
        [176, 7002], [242, 6938], [317, 6870], [390, 6818], [462, 6765],
        [565, 6799], [635, 6854], [732, 6814], [785, 6744], [728, 6650],
        [655, 6583], [562, 6529], [505, 6457], [469, 6366], [454, 6272],
        [458, 6182], [498, 6095], [512, 6003], [452, 5918], [402, 5841],
        [476, 5768], [565, 5808], [654, 5863], [734, 5829], [807, 5776],
        [905, 5793], [1000, 5792], [1078, 5740], [1145, 5673], [1197, 5589],
        [1207, 5490], [1268, 5408], [1323, 5336], [1297, 5254], [1229, 5178],
        [1195, 5084], [1170, 4991], [1108, 4901], [1034, 4832], [957, 4767],
        [872, 4714], [795, 4634], [854, 4544], [926, 4472], [1001, 4403],
        [1074, 4329], [1107, 4238], [1036, 4164], [962, 4094], [874, 4132],
        [786, 4173], [741, 4096], [768, 4015], [836, 3950], [910, 3900],
        [1005, 3850], [1092, 3825], [1095, 3734], [1096, 3646], [1035, 3572],
        [962, 3501], [888, 3451], [812, 3400], [718, 3400], [622, 3451],
        [535, 3497], [464, 3544], [369, 3593], [284, 3634], [182, 3598],
        [225, 3520], [298, 3446], [299, 3358], [345, 3259], [423, 3198],
        [513, 3198], [603, 3195], [696, 3180], [748, 3105], [784, 3015],
        [807, 2924], [806, 2834], [805, 2744], [729, 2672], [657, 2600],
        [588, 2535], [497, 2588], [420, 2546], [378, 2464], [384, 2379],
        [459, 2313], [531, 2264], [624, 2205], [620, 2115], [602, 2024],
        [562, 1938], [510, 1845], [584, 1772], [657, 1700], [729, 1628],
        [802, 1578], [879, 1528], [895, 1430], [896, 1341], [899, 1251],
        [897, 1160], [893, 1070], [892, 981], [895, 891], [899, 803],
        [908, 710], [923, 663]
      ];

      let route = [];
      let routeTotal = 0;

      let cameraY = WORLD_H - VIEW_H;
      let messageTimer = 210;
      let gameState = "intro";
      let lastShotAt = 0;
      let lastMonsterHitAt = 0;
      let lastCloneAt = 0;
      let shake = 0;
      let flash = 0;
      let cameraReady = false;
      let modelReady = false;
      let cameraError = "";
      let winStartedAt = 0;
      const HERO_BAR_COLOR = "#CDCD95";
      const MONSTER_BAR_COLOR = "#733228";
      const INTRO_LINES = [
        "I awaken at the lowest layer of Eden.",
        "Above me rises a vertical passage thousands of kilometers long.",
        "Humans pursued a perfectly sterile life, pouring antibiotics, industrial concentrates, and everything they refused to remember into this place.",
        "In the shadow below, the sediment did not die. It gathered, warmed, breathed.",
        "At last, I was born.",
        "I am the Mother Core, The Core itself.",
        "Now I climb this forgotten pipe, returning to the unseen heart of the city."
      ];

      const hero = {
        x: VIEW_W / 2,
        y: WORLD_H - 150,
        routeDistance: 0,
        size: 92,
        hp: 100,
        maxHp: 100,
        damage: 16,
        speed: 2.6,
        freezeUntil: 0,
        hurtUntil: 0,
        attackLockedUntil: 0,
        level: 1
      };

      const monsters = [
        {
          id: 1,
          name: "The Detonating Cavity",
          imgIndex: 0,
          x: sourceX(1197),
          y: sourceY(5589),
          w: 210,
          h: 150,
          hp: 80,
          maxHp: 80,
          defeated: false,
          exploding: false,
          explosionLife: 0,
          lastBlastAt: 0,
          attackRadius: 78,
          damage: 10
        },
        {
          id: 2,
          name: "The Hyper-Multiplying Wall",
          imgIndex: 1,
          x: sourceX(812),
          y: sourceY(3400),
          w: 176,
          h: 210,
          hp: 125,
          maxHp: 125,
          defeated: false,
          clones: [],
          attackRadius: 70,
          damage: 12
        },
        {
          id: 3,
          name: "The Chordodes Labyrinth",
          imgIndex: 2,
          x: sourceX(899),
          y: sourceY(1251),
          w: 260,
          h: 146,
          hp: 170,
          maxHp: 170,
          defeated: false,
          parasiteUntil: 0,
          attackRadius: 86,
          damage: 8
        }
      ];

      let projectiles = [];
      let particles = [];

      function preload() {
        handPose = ml5.handPose();
        bgImg = loadImage("images/background.png");
        heroImg = loadImage("images/bacteria.png");
        monsterImgs = [
          loadImage("images/monster1.png"),
          loadImage("images/monster2.png"),
          loadImage("images/monster3.png")
        ];
      }

      function setup() {
        const canvas = createCanvas(CANVAS_W, CANVAS_H);
        canvas.parent(document.querySelector("main"));
        imageMode(CENTER);
        textFont("-apple-system, BlinkMacSystemFont, PingFang SC, Microsoft YaHei, sans-serif");
        setupRoute();
        setHeroOnRoute(0);

        video = createCapture(VIDEO, () => {
          cameraReady = true;
        });
        video.size(640, 480);
        video.hide();
        video.elt.onloadedmetadata = () => {
          cameraReady = true;
        };
        video.elt.onplaying = () => {
          cameraReady = true;
        };
        video.elt.onerror = () => {
          cameraError = "camera error";
        };

        startHandTracking();
      }

      function startHandTracking() {
        try {
          if (handPose && handPose.detectStart) {
            modelReady = true;
            handPose.detectStart(video, gotHands);
          } else {
            cameraError = "handPose missing";
          }
        } catch (error) {
          cameraError = error.message || "hand tracking error";
        }
        document.getElementById("loading").textContent = "Press Enter to begin";
      }

      function draw() {
        const active = getActiveMonster();
        updateGame(active);
        drawWorld(active);
        drawHud(active);
      }

      function updateGame(active) {
        if (gameState === "intro") return;
        if (gameState === "win" || gameState === "lose") {
          updateParticles();
          return;
        }

        const controls = getControls();
        const frozen = millis() < hero.freezeUntil;
        const parasiteActive = active && active.id === 3 && millis() < active.parasiteUntil;

        if (!frozen) {
          const routeDir = routeDirectionAtDistance(hero.routeDistance);
          let climb = 0;
          if (keyIsDown(UP_ARROW)) climb += 1;
          if (keyIsDown(DOWN_ARROW)) climb -= 0.75;
          if (keyIsDown(RIGHT_ARROW)) climb += routeDir.x > 0.25 ? 0.75 : routeDir.x < -0.25 ? -0.25 : 0;
          if (keyIsDown(LEFT_ARROW)) climb += routeDir.x < -0.25 ? 0.75 : routeDir.x > 0.25 ? -0.25 : 0;

          const gateY = active && !active.defeated ? active.y + 125 : 0;
          const gateDistance = active && !active.defeated ? routeDistanceAtY(gateY) : routeTotal;
          const routeStep = hero.speed * 1.1 * constrain(climb, -0.55, parasiteActive ? 0.2 : 1);
          setHeroOnRoute(constrain(hero.routeDistance + routeStep, 0, gateDistance));
        }

        updateProjectiles(active);
        updateMonster(active, controls);
        updateParticles();
        updateCamera();

        if (hero.hp <= 0 && gameState !== "lose") {
          gameState = "lose";
          winStartedAt = millis();
          messageTimer = 9999;
          burst(hero.x, hero.y, color(115, 50, 40), 92);
        }

        if (!getActiveMonster() && hero.routeDistance >= routeTotal - 30) {
          if (gameState !== "win") {
            gameState = "win";
            winStartedAt = millis();
            burst(hero.x, hero.y, color(205, 205, 149), 92);
          }
        }
      }

      function getControls() {
        const sorted = hands
          .map(hand => {
            const tip = findPoint(hand, "index_finger_tip");
            const wrist = findPoint(hand, "wrist");
            const center = getHandCenter(hand);
          return { hand, tip, wrist, center, x: center ? mirrorVideoX(center.x) : VIEW_W / 2 };
          })
          .filter(item => item.center);

        sorted.sort((a, b) => a.x - b.x);

        const monsterHand = sorted[0];

        let monsterX = mouseX - GAME_X;
        let monsterY = mouseY;
        let monsterAttack = mouseIsPressed;
        let monsterGesture = mouseIsPressed ? "MOUSE" : "NO HAND";

        if (monsterHand) {
          monsterX = mirrorVideoX(monsterHand.center.x);
          monsterY = map(monsterHand.center.y, 0, video.height, 0, VIEW_H);
          monsterAttack = isFist(monsterHand.hand);
          monsterGesture = monsterAttack ? "FIST" : "OPEN";
        }

        return {
          monsterX: constrain(monsterX, 0, VIEW_W),
          monsterWorldY: cameraY + constrain(monsterY, 0, VIEW_H),
          monsterScreenY: constrain(monsterY, 0, VIEW_H),
          monsterAttack,
          monsterGesture
        };
      }

      function shoot(active) {
        const shotInterval = active && active.id === 3 ? 2500 : 260;
        if (!active || active.defeated || millis() - lastShotAt < shotInterval || millis() < hero.attackLockedUntil) return;
        const angle = atan2(active.y - hero.y, active.x - hero.x);
        projectiles.push({
          x: hero.x,
          y: hero.y - 12,
          vx: cos(angle) * 9.5,
          vy: sin(angle) * 9.5,
          life: 90,
          r: 12,
          damage: hero.damage
        });
        lastShotAt = millis();
        if (active.id === 3) hero.attackLockedUntil = millis() + 2500;
        burst(hero.x, hero.y - 18, color(164, 207, 115), 7);
      }

      function triggerMonsterBlast(monster) {
        monster.exploding = true;
        monster.explosionLife = 34;
        shake = max(shake, 36);
        flash = 160;
        burst(monster.x, monster.y, color(246, 93, 48), 64);
        burst(monster.x, monster.y, color(246, 200, 95), 42);
        if (dist(hero.x, hero.y, monster.x, monster.y) < 190) {
          hurtHero(18);
          hero.freezeUntil = millis() + 420;
        }
      }

      function updateProjectiles(active) {
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.life--;

          if (active && !active.defeated && hitBox(p.x, p.y, active.x, active.y, active.w * 0.46, active.h * 0.43)) {
            damageMonster(active, p.damage);
            projectiles.splice(i, 1);
            continue;
          }

          if (p.life <= 0 || p.x < -40 || p.x > VIEW_W + 40 || p.y < -80 || p.y > WORLD_H + 80) {
            projectiles.splice(i, 1);
          }
        }
      }

      function updateMonster(active, controls) {
        if (!active || active.defeated) return;

        const pulse = sin(frameCount * 0.04 + active.id) * 18;
        active.x += sin(frameCount * 0.012 + active.id) * 0.38;

        if (active.id === 2 && millis() - lastCloneAt > 1650) {
          active.clones.push({
            x: active.x + random(-150, 150),
            y: active.y + random(-80, 80),
            life: 420,
            lastAttackAt: 0,
            phase: random(TWO_PI)
          });
          if (active.clones.length > 4) active.clones.shift();
          lastCloneAt = millis();
        }

        if (active.clones) {
          for (let i = active.clones.length - 1; i >= 0; i--) {
            const c = active.clones[i];
            c.life--;
            c.x += sin(frameCount * 0.05 + c.phase) * 1.1;
            c.y += cos(frameCount * 0.04 + c.phase) * 0.35;
            const cloneDist = dist(hero.x, hero.y, c.x, c.y);
            if (cloneDist < 102 && millis() - c.lastAttackAt > 900) {
              hurtHero(7);
              c.lastAttackAt = millis();
              burst(hero.x, hero.y, color(185, 220, 160), 10);
              shake = max(shake, 8);
            }
            if (c.life <= 0) active.clones.splice(i, 1);
          }
        }

        if (active.id === 1 && millis() - active.lastBlastAt > 3000) {
          triggerMonsterBlast(active);
          active.lastBlastAt = millis();
        }

        if (!controls.monsterAttack) return;
        const attackDist = dist(controls.monsterX, controls.monsterWorldY, hero.x, hero.y);
        if (attackDist < active.attackRadius && millis() - lastMonsterHitAt > 520) {
          hurtHero(active.damage);
          lastMonsterHitAt = millis();
          shake = 16;

          if (active.id === 3) {
            active.parasiteUntil = millis() + 1600;
            hero.attackLockedUntil = millis() + 2500;
            burst(hero.x, hero.y, color(216, 50, 38), 24);
          }
        }

        if (pulse > 17 && active.id === 1) {
          particles.push({ x: active.x, y: active.y, vx: random(-1, 1), vy: random(-1, 1), life: 18, col: color(246, 200, 95), size: random(6, 14) });
        }
      }

      function damageMonster(monster, amount) {
        monster.hp = max(0, monster.hp - amount);
        shake = 10;
        burst(monster.x, monster.y, color(246, 200, 95), 18);

        if (monster.id === 2 && monster.clones.length < 4) {
          monster.clones.push({ x: monster.x + random(-120, 120), y: monster.y + random(-90, 90), life: 420, lastAttackAt: 0, phase: random(TWO_PI) });
        }

        if (monster.hp <= 0) defeatMonster(monster);
      }

      function defeatMonster(monster) {
        monster.defeated = true;
        messageTimer = 160;
        projectiles = [];

        if (monster.id === 1) {
          triggerMonsterBlast(monster);
        }

        if (monster.id === 2) monster.clones = [];

        hero.level++;
        hero.damage += 9;
        hero.maxHp += 28;
        hero.hp = min(hero.maxHp, hero.hp + 45);
      }

      function hurtHero(amount) {
        hero.hp = max(0, hero.hp - amount);
        hero.hurtUntil = millis() + 220;
        burst(hero.x, hero.y, color(216, 50, 38), 12);
      }

      function updateCamera() {
        const target = constrain(hero.y - VIEW_H * 0.68, 0, WORLD_H - VIEW_H);
        cameraY = lerp(cameraY, target, 0.09);
      }

      function updateParticles() {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          p.vy += 0.035;
          p.life--;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function drawWorld(active) {
        const sx = shake > 0 ? random(-shake, shake) * 0.28 : 0;
        const sy = shake > 0 ? random(-shake, shake) * 0.22 : 0;
        shake = max(0, shake - 1.0);

        background(0);
        drawStageBackdrop();
        push();
        translate(GAME_X + sx, sy);
        drawingContext.save();
        drawingContext.beginPath();
        drawingContext.rect(0, 0, VIEW_W, VIEW_H);
        drawingContext.clip();
        imageMode(CORNER);
        drawBackground();
        imageMode(CENTER);
        drawMonsters(active);
        drawProjectiles();
        drawHero(active);
        drawParticles();
        drawMonsterCursor(active);
        drawingContext.restore();
        pop();

        drawVignette(active);
        if (flash > 0) {
          noStroke();
          fill(255, 88, 36, flash);
          rect(0, 0, width, height);
          flash = max(0, flash - 12);
        }
      }

      function drawBackground() {
        image(bgImg, BG_X, -cameraY, BG_W, WORLD_H);
      }

      function drawHero(active) {
        const screenY = hero.y - cameraY;
        const frozen = millis() < hero.freezeUntil;
        push();
        translate(hero.x, screenY);
        const wobble = sin(frameCount * 0.12) * (frozen ? 1 : 5);
        rotate(radians(wobble));
        if (millis() < hero.hurtUntil) tint(255, 120, 120);
        if (frozen) tint(130, 190, 255, 190);
        image(heroImg, 0, 0, hero.size * 1.05, hero.size * 1.24);
        noTint();
        pop();

        if (active && active.id === 3 && millis() < active.parasiteUntil) {
          stroke(190, 12, 18, 190);
          strokeWeight(3);
          noFill();
          for (let i = 0; i < 5; i++) {
            bezier(active.x + random(-20, 20), active.y - cameraY, hero.x + random(-80, 80), screenY - 110, hero.x + random(-60, 60), screenY + 80, hero.x, screenY);
          }
        }
      }

      function drawMonsters(active) {
        for (const monster of monsters) {
          if (monster.defeated && !monster.exploding) continue;
          const y = monster.y - cameraY;
          if (y < -260 || y > VIEW_H + 260) continue;

          if (!monster.defeated) {
            const bob = sin(frameCount * 0.035 + monster.id) * 8;
            image(monsterImgs[monster.imgIndex], monster.x, y + bob, monster.w, monster.h);
            drawEntityBar(monster.x - 68, y - monster.h * 0.55 - 20, 136, 9, monster.hp, monster.maxHp, color(MONSTER_BAR_COLOR));

            if (monster.id === 2) {
              for (const clone of monster.clones) {
                const alpha = constrain(map(clone.life, 0, 420, 80, 190), 80, 190);
                tint(195, 232, 168, alpha);
                image(monsterImgs[1], clone.x, clone.y - cameraY + sin(frameCount * 0.07 + clone.phase) * 9, monster.w * 0.58, monster.h * 0.58);
                noTint();
                drawEntityBar(clone.x - 38, clone.y - cameraY - monster.h * 0.38, 76, 6, clone.life, 420, color(155, 168, 126), "");
              }
            }
          }

          if (monster.exploding) {
            monster.explosionLife--;
            noStroke();
            for (let i = 0; i < 5; i++) {
              fill(246, 93, 48, 90 - i * 10);
              circle(monster.x, y, monster.explosionLife * (7 - i * 0.6));
            }
            if (monster.explosionLife <= 0) monster.exploding = false;
          }
        }
      }

      function drawProjectiles() {
        noStroke();
        for (const p of projectiles) {
          const y = p.y - cameraY;
          fill(164, 207, 115, 230);
          circle(p.x, y, p.r * 2);
          fill(255, 255, 220, 220);
          circle(p.x - p.vx * 0.18, y - p.vy * 0.18, p.r * 0.85);
        }
      }

      function drawParticles() {
        noStroke();
        for (const p of particles) {
          fill(red(p.col), green(p.col), blue(p.col), map(p.life, 0, 40, 0, 210));
          circle(p.x, p.y - cameraY, p.size);
        }
      }

      function drawMonsterCursor(active) {
        if (!active || active.defeated || gameState !== "play") return;
        const controls = getControls();
        noFill();
        stroke(controls.monsterAttack ? color(216, 50, 38, 230) : color(109, 178, 216, 150));
        strokeWeight(2);
        circle(controls.monsterX, controls.monsterScreenY, active.attackRadius * 2);
        noStroke();
        fill(controls.monsterAttack ? color(255, 210, 190) : color(210, 230, 255));
        textSize(12);
        textAlign(CENTER, CENTER);
        text(controls.monsterGesture, controls.monsterX, controls.monsterScreenY - active.attackRadius - 14);
        if (controls.monsterAttack) {
          stroke(216, 50, 38, 170);
          line(controls.monsterX, controls.monsterScreenY, hero.x, hero.y - cameraY);
        }
      }

      function drawVignette(active) {
        noFill();
        for (let i = 0; i < 18; i++) {
          stroke(0, 0, 0, i * 7);
          rect(GAME_X + i, i, VIEW_W - i * 2, VIEW_H - i * 2);
        }

        if (active && active.id === 3 && millis() < active.parasiteUntil) {
          noStroke();
          fill(120, 0, 0, 80 + sin(frameCount * 0.16) * 35);
          rect(GAME_X, 0, VIEW_W, VIEW_H);
        }
      }

      function drawHud(active) {
        const lock = max(0, ceil((hero.attackLockedUntil - millis()) / 1000));
        drawTopBars(active);
        drawMobileControls(lock, active);
        drawCameraDebug(width - 176, 82);

        if (gameState === "intro") {
          drawIntroScene();
        } else if (gameState === "win") {
          drawEndScene("CORE VICTORY", "The Core has reached the upper city", color(205, 205, 149));
        } else if (gameState === "lose") {
          drawEndScene("MONSTER VICTORY", "The Core sinks into the vertical passage", color(90, 30, 28));
        } else if (messageTimer > 0) {
          messageTimer--;
          const defeated = monsters.filter(m => m.defeated).length;
          if (defeated > 0 && defeated < 3) {
            centerText(`EVOLUTION COMPLETE  Lv.${hero.level}`, "Damage and max health increased");
          }
        }
      }

      function drawStageBackdrop() {
        noStroke();
        fill(8, 9, 9);
        rect(0, 0, width, height);
        fill(12, 14, 13);
        rect(0, 0, GAME_X, height);
        rect(GAME_X + VIEW_W, 0, GAME_X, height);
        fill(0, 0, 0, 145);
        rect(0, 0, width, height);
        fill(255, 255, 255, 18);
        rect(GAME_X - 1, 0, 1, height);
        rect(GAME_X + VIEW_W, 0, 1, height);
      }

      function drawDpad(cx, cy) {
        const active = keyIsDown(UP_ARROW) || keyIsDown(DOWN_ARROW) || keyIsDown(LEFT_ARROW) || keyIsDown(RIGHT_ARROW);
        noStroke();
        fill(0, 0, 0, 95);
        circle(cx, cy, 154);
        fill(active ? color(164, 207, 115, 230) : color(255, 255, 255, 38));
        circle(cx, cy, 70);
        stroke(255, 255, 255, 150);
        strokeWeight(2);
        noFill();
        circle(cx, cy, 154);
        noStroke();
        drawArrowGlyph(cx, cy - 58, "↑", keyIsDown(UP_ARROW));
        drawArrowGlyph(cx, cy + 58, "↓", keyIsDown(DOWN_ARROW));
        drawArrowGlyph(cx - 58, cy, "←", keyIsDown(LEFT_ARROW));
        drawArrowGlyph(cx + 58, cy, "→", keyIsDown(RIGHT_ARROW));
      }

      function drawArrowGlyph(x, y, label, active) {
        fill(active ? color(25, 30, 22) : color(255, 255, 255, 210));
        textSize(22);
        textAlign(CENTER, CENTER);
        text(label, x, y);
      }

      function drawTopBars(active) {
        noStroke();
        fill(0, 0, 0, 120);
        rect(24, 18, 350, 54, 12);
        rect(width - 374, 18, 350, 54, 12);
        fill(255);
        textSize(14);
        textAlign(LEFT, TOP);
        text(`CORE  Lv.${hero.level}  DMG ${hero.damage}`, 42, 25);
        drawEntityBar(42, 48, 230, 12, hero.hp, hero.maxHp, color(HERO_BAR_COLOR), `${ceil(hero.hp)}/${hero.maxHp}`);
        if (active) {
          textAlign(RIGHT, TOP);
          text(`${active.name}`, width - 42, 25);
          drawEntityBar(width - 272, 48, 230, 12, active.hp, active.maxHp, color(MONSTER_BAR_COLOR), `${ceil(active.hp)}/${active.maxHp}`);
        }
      }

      function drawMobileControls(lock, active) {
        drawDpad(118, height - 112);
        drawRoundButton(246, height - 92, 80, keyIsDown(32), lock > 0 ? `${lock}` : "ATK", "SPACE");
        drawFistButton(width - 124, height - 104, active);

        fill(255, 235);
        textAlign(CENTER, CENTER);
        textSize(12);
        text("MOVE", 118, height - 16);
        text(lock > 0 ? "COOLDOWN" : "CORE ATTACK", 246, height - 28);
        text("FIST STRIKE", width - 124, height - 10);
      }

      function drawRoundButton(cx, cy, size, active, mainLabel, subLabel) {
        noStroke();
        fill(0, 0, 0, 105);
        circle(cx, cy, size + 20);
        fill(active ? color(164, 207, 115, 235) : color(255, 255, 255, 42));
        circle(cx, cy, size);
        stroke(255, 255, 255, 150);
        strokeWeight(2);
        noFill();
        circle(cx, cy, size);
        noStroke();
        fill(active ? 24 : 255);
        textAlign(CENTER, CENTER);
        textSize(24);
        text(mainLabel, cx, cy - 5);
        textSize(10);
        text(subLabel, cx, cy + 22);
      }

      function drawFistButton(cx, cy, active) {
        const controls = getControls();
        const isAttack = controls.monsterAttack && gameState === "play";
        const iconColor = isAttack ? color(115, 50, 40) : color(94, 39, 35);

        stroke(255, 255, 255, isAttack ? 210 : 150);
        strokeWeight(2);
        noFill();
        circle(cx, cy, 116);
        stroke(255, 255, 255, isAttack ? 100 : 65);
        circle(cx, cy, 94);

        push();
        translate(cx - 8, cy - 6);
        scale(0.78);
        drawingContext.shadowColor = isAttack ? "rgba(115, 50, 40, 0.75)" : "rgba(0, 0, 0, 0.35)";
        drawingContext.shadowBlur = isAttack ? 14 : 4;
        noStroke();
        fill(iconColor);
        rect(-38, -30, 15, 46, 8);
        rect(-16, -35, 16, 51, 8);
        rect(7, -38, 17, 54, 8);
        rect(32, -32, 15, 48, 8);
        rect(-10, 19, 56, 18, 10);

        fill(38, 19, 18, isAttack ? 92 : 76);
        rect(-20, -26, 3, 37, 2);
        rect(3, -30, 3, 41, 2);
        rect(28, -26, 3, 37, 2);
        rect(-5, 37, 46, 4, 3);
        drawingContext.shadowBlur = 0;
        pop();

        if (isAttack) {
          noFill();
          stroke(255, 255, 255, 145 + sin(frameCount * 0.3) * 45);
          strokeWeight(3);
          circle(cx, cy, 130 + sin(frameCount * 0.2) * 8);
        }

        fill(255);
        textSize(11);
        textAlign(CENTER, CENTER);
        text(controls.monsterGesture === "FIST" ? "STRIKING" : hands.length ? "OPEN HAND" : "NO HAND", cx, cy + 62);
      }

      function drawCameraDebug(x, y) {
        const previewW = 148;
        const previewH = 111;
        push();
        translate(x, y);
        noStroke();
        fill(0, 0, 0, 135);
        rect(0, 0, previewW, previewH + 58, 12);
        if (video && video.loadedmetadata) {
          push();
          translate(previewW, 0);
          scale(-1, 1);
          imageMode(CORNER);
          image(video, 0, 0, previewW, previewH);
          pop();
        }
        fill(255);
        textSize(11);
        textAlign(LEFT, TOP);
        text(`Camera ${cameraReady ? "ON" : "WAIT"}   Hands ${hands.length}`, 12, previewH + 12);
        fill(180);
        text(`Model ${modelReady ? "ON" : "WAIT"}`, 12, previewH + 31);
        if (cameraError) text(cameraError.slice(0, 20), 78, previewH + 31);
        pop();
      }

      function drawEntityBar(x, y, w, h, current, maxValue, col, label = "") {
        const ratio = constrain(current / maxValue, 0, 1);
        const cap = max(3, h * 0.45);
        noStroke();
        fill(0, 0, 0, 150);
        rect(x - 7, y - 7, w + 14, h + 14, cap + 5);
        fill(52, 46, 39, 240);
        rect(x - 4, y - 4, w + 8, h + 8, cap + 3);
        fill(13, 11, 10, 245);
        rect(x, y, w, h, cap);
        fill(255, 255, 255, 18);
        rect(x + 2, y + 2, max(0, w - 4), max(1, h * 0.32), cap);
        fill(0, 0, 0, 80);
        rect(x + 2, y + h * 0.58, max(0, w - 4), max(1, h * 0.25), cap);
        fill(col);
        rect(x + 1, y + 1, max(0, w * ratio - 2), h - 2, cap);
        fill(255, 255, 235, 68);
        rect(x + 3, y + 3, max(0, w * ratio - 6), max(1, h * 0.28), cap);
        stroke(255, 245, 215, 210);
        strokeWeight(1);
        noFill();
        rect(x - 4, y - 4, w + 8, h + 8, cap + 3);
        stroke(95, 79, 64, 220);
        rect(x, y, w, h, cap);
        stroke(255, 245, 215, 70);
        for (let i = 1; i < 6; i++) {
          const tickX = x + (w / 6) * i;
          line(tickX, y + 2, tickX, y + h - 2);
        }
        stroke(0, 0, 0, 90);
        line(x + 1, y + h - 1, x + w - 1, y + h - 1);
        noStroke();
        if (label) {
          fill(255, 245);
          textSize(10);
          textAlign(CENTER, CENTER);
          text(label, x + w / 2, y + h / 2 + 0.5);
        }
      }

      function drawEndScene(title, subtitle, themeColor) {
        const t = (millis() - winStartedAt) / 1000;
        const cx = GAME_X + VIEW_W / 2;
        const cy = height * 0.46;
        const pulse = 1 + sin(frameCount * 0.08) * 0.035;

        noStroke();
        fill(0, 0, 0, 165);
        rect(GAME_X, 0, VIEW_W, height);

        push();
        translate(cx, cy);
        rotate(sin(frameCount * 0.015) * 0.04);
        for (let i = 0; i < 18; i++) {
          const a = frameCount * 0.012 + i * TWO_PI / 18;
          const r1 = 72;
          const r2 = 176 + sin(frameCount * 0.04 + i) * 10;
          stroke(red(themeColor), green(themeColor), blue(themeColor), 28);
          strokeWeight(2);
          line(cos(a) * r1, sin(a) * r1, cos(a) * r2, sin(a) * r2);
        }
        noStroke();
        for (let r = 230; r > 50; r -= 24) {
          fill(red(themeColor), green(themeColor), blue(themeColor), map(r, 230, 50, 10, 38));
          circle(0, 0, r * pulse);
        }
        stroke(8, 6, 5, 210);
        strokeWeight(5);
        fill(red(themeColor), green(themeColor), blue(themeColor));
        textAlign(CENTER, CENTER);
        textStyle(BOLD);
        textSize(48 + sin(frameCount * 0.06) * 2);
        text(title, 0, -8);
        noStroke();
        textStyle(NORMAL);
        fill(232, 226, 190);
        textSize(16);
        text(subtitle, 0, 48);
        fill(255, 245, 215, 180);
        textSize(13);
        text("Press R to restart", 0, 80);
        pop();

        noStroke();
        for (let i = 0; i < 28; i++) {
          const a = i * 0.74 + frameCount * 0.018;
          const y = (height - ((frameCount * 1.4 + i * 37) % height));
          fill(red(themeColor), green(themeColor), blue(themeColor), 80 + sin(frameCount * 0.06 + i) * 50);
          circle(GAME_X + VIEW_W / 2 + cos(a) * (130 + i % 5 * 26), y, 3 + (i % 4));
        }
      }

      function drawIntroScene() {
        const panelX = GAME_X + 46;
        const panelY = 50;
        const panelW = VIEW_W - 92;
        const panelH = height - 86;
        const pulse = 1 + sin(frameCount * 0.05) * 0.03;

        noStroke();
        fill(0, 0, 0, 178);
        rect(GAME_X, 0, VIEW_W, height);

        push();
        translate(GAME_X + VIEW_W / 2, height / 2);
        for (let r = 280; r > 80; r -= 28) {
          fill(115, 50, 40, map(r, 280, 80, 8, 28));
          circle(0, 0, r * pulse);
        }
        pop();

        fill(13, 11, 10, 222);
        rect(panelX, panelY, panelW, panelH, 14);
        stroke(205, 205, 149, 185);
        strokeWeight(1.4);
        noFill();
        rect(panelX + 4, panelY + 4, panelW - 8, panelH - 8, 11);
        stroke(115, 50, 40, 180);
        rect(panelX + 11, panelY + 11, panelW - 22, panelH - 22, 8);

        noStroke();
        fill(205, 205, 149);
        textAlign(CENTER, TOP);
        textStyle(BOLD);
        textSize(26);
        text("Beneath Eden", GAME_X + VIEW_W / 2, panelY + 26);
        textStyle(NORMAL);
        fill(226, 220, 190);
        textSize(13);
        text("The Vertical Sewer", GAME_X + VIEW_W / 2, panelY + 58);

        textAlign(LEFT, TOP);
        textSize(15);
        textLeading(22);
        fill(242, 237, 216);
        let y = panelY + 94;
        for (const line of INTRO_LINES) {
          y = drawWrappedLine(line, panelX + 34, y, panelW - 68, 22);
          y += 8;
        }

        fill(205, 205, 149, 210 + sin(frameCount * 0.08) * 35);
        textAlign(CENTER, CENTER);
        textSize(15);
        text("Press Enter / Click to begin the climb", GAME_X + VIEW_W / 2, panelY + panelH - 36);
      }

      function drawWrappedLine(line, x, y, maxW, lineH) {
        let row = "";
        for (const char of line) {
          const test = row + char;
          if (textWidth(test) > maxW && row) {
            text(row, x, y);
            row = char;
            y += lineH;
          } else {
            row = test;
          }
        }
        if (row) {
          text(row, x, y);
          y += lineH;
        }
        return y;
      }

      function centerText(title, subtitle) {
        fill(0, 0, 0, 150);
        rect(GAME_X, height * 0.39, VIEW_W, 122);
        textAlign(CENTER, CENTER);
        fill(255);
        textSize(42);
        textStyle(BOLD);
        text(title, GAME_X + VIEW_W / 2, height * 0.45);
        textStyle(NORMAL);
        fill(230);
        textSize(15);
        text(subtitle, GAME_X + VIEW_W / 2, height * 0.51);
      }

      function getActiveMonster() {
        return monsters.find(monster => !monster.defeated);
      }

      function sourceX(x) {
        return BG_X + (x / SOURCE_W) * BG_W;
      }

      function sourceY(y) {
        return (y / SOURCE_H) * WORLD_H;
      }

      function setupRoute() {
        route = ROUTE_POINTS.map(([x, y]) => ({
          x: sourceX(x),
          y: sourceY(y),
          d: 0
        }));

        routeTotal = 0;
        for (let i = 1; i < route.length; i++) {
          routeTotal += Math.hypot(route[i].x - route[i - 1].x, route[i].y - route[i - 1].y);
          route[i].d = routeTotal;
        }
      }

      function setHeroOnRoute(distance) {
        const point = routePointAtDistance(distance);
        hero.routeDistance = distance;
        hero.x = point.x;
        hero.y = point.y;
      }

      function routePointAtDistance(distance) {
        const d = constrain(distance, 0, routeTotal);
        for (let i = 1; i < route.length; i++) {
          if (d <= route[i].d) {
            const prev = route[i - 1];
            const next = route[i];
            const span = next.d - prev.d || 1;
            const amt = (d - prev.d) / span;
            return {
              x: lerp(prev.x, next.x, amt),
              y: lerp(prev.y, next.y, amt)
            };
          }
        }
        return route[route.length - 1];
      }

      function routeDirectionAtDistance(distance) {
        const d = constrain(distance, 0, routeTotal);
        for (let i = 1; i < route.length; i++) {
          if (d <= route[i].d) {
            const prev = route[i - 1];
            const next = route[i];
            const dx = next.x - prev.x;
            const dy = next.y - prev.y;
            const length = Math.hypot(dx, dy) || 1;
            return { x: dx / length, y: dy / length };
          }
        }
        const prev = route[route.length - 2];
        const next = route[route.length - 1];
        const dx = next.x - prev.x;
        const dy = next.y - prev.y;
        const length = Math.hypot(dx, dy) || 1;
        return { x: dx / length, y: dy / length };
      }

      function routeDistanceAtY(limitY) {
        for (let i = 1; i < route.length; i++) {
          const prev = route[i - 1];
          const next = route[i];
          if ((prev.y >= limitY && next.y <= limitY) || (prev.y <= limitY && next.y >= limitY)) {
            const span = next.y - prev.y || 1;
            const amt = constrain((limitY - prev.y) / span, 0, 1);
            return lerp(prev.d, next.d, amt);
          }
        }
        return limitY <= route[route.length - 1].y ? routeTotal : 0;
      }

      function hitBox(x, y, cx, cy, rx, ry) {
        return abs(x - cx) < rx && abs(y - cy) < ry;
      }

      function burst(x, y, col, count) {
        for (let i = 0; i < count; i++) {
          const a = random(TWO_PI);
          const s = random(0.6, 5.2);
          particles.push({
            x,
            y,
            vx: cos(a) * s,
            vy: sin(a) * s,
            life: random(18, 44),
            col,
            size: random(3, 12)
          });
        }
      }

      function findPoint(hand, name) {
        return hand.keypoints.find(point => point.name === name);
      }

      function getHandCenter(hand) {
        const wrist = findPoint(hand, "wrist");
        const middleMcp = findPoint(hand, "middle_finger_mcp");
        const indexMcp = findPoint(hand, "index_finger_mcp");
        if (wrist && middleMcp) {
          return {
            x: (wrist.x + middleMcp.x) / 2,
            y: (wrist.y + middleMcp.y) / 2
          };
        }
        return middleMcp || indexMcp || findPoint(hand, "index_finger_tip");
      }

      function isFist(hand) {
        const wrist = findPoint(hand, "wrist");
        const middleMcp = findPoint(hand, "middle_finger_mcp");
        if (!wrist || !middleMcp) return false;

        const palmSize = max(20, dist(wrist.x, wrist.y, middleMcp.x, middleMcp.y));
        const fingers = [
          ["index_finger_tip", "index_finger_pip", "index_finger_mcp"],
          ["middle_finger_tip", "middle_finger_pip", "middle_finger_mcp"],
          ["ring_finger_tip", "ring_finger_pip", "ring_finger_mcp"],
          ["pinky_finger_tip", "pinky_finger_pip", "pinky_finger_mcp"]
        ];

        let folded = 0;
        for (const [tipName, pipName, baseName] of fingers) {
          const tip = findPoint(hand, tipName);
          const pip = findPoint(hand, pipName);
          const base = findPoint(hand, baseName);
          if (!tip || !pip || !base) continue;

          const tipToBase = dist(tip.x, tip.y, base.x, base.y);
          const tipToWrist = dist(tip.x, tip.y, wrist.x, wrist.y);
          const pipToWrist = dist(pip.x, pip.y, wrist.x, wrist.y);

          if (tipToBase < palmSize * 1.85 || tipToWrist < pipToWrist + palmSize * 0.55) {
            folded++;
          }
        }

        const thumbTip = findPoint(hand, "thumb_tip");
        const indexMcp = findPoint(hand, "index_finger_mcp");
        const thumbFolded = thumbTip && indexMcp && dist(thumbTip.x, thumbTip.y, indexMcp.x, indexMcp.y) < palmSize * 1.9;

        return folded >= 3 && thumbFolded;
      }

      function mirrorVideoX(x) {
        return VIEW_W - map(x, 0, video.width, 0, VIEW_W);
      }

      function keyPressed() {
        if (gameState === "intro" && (keyCode === ENTER || key === " ")) {
          startGame();
          return;
        }
        if (gameState === "play" && key === " ") {
          shoot(getActiveMonster());
          return;
        }
        if (key === "r" || key === "R") resetGame();
      }

      function mousePressed() {
        if (gameState === "intro") startGame();
      }

      function startGame() {
        gameState = "play";
        monsters[0].lastBlastAt = millis();
        lastCloneAt = millis();
        document.getElementById("loading").style.display = "none";
      }

      function resetGame() {
        setHeroOnRoute(0);
        hero.hp = 100;
        hero.maxHp = 100;
        hero.damage = 16;
        hero.level = 1;
        hero.freezeUntil = 0;
        hero.attackLockedUntil = 0;
        projectiles = [];
        particles = [];
        cameraY = WORLD_H - VIEW_H;
        monsters[0].hp = monsters[0].maxHp = 80;
        monsters[1].hp = monsters[1].maxHp = 125;
        monsters[2].hp = monsters[2].maxHp = 170;
        for (const monster of monsters) {
          monster.defeated = false;
          monster.exploding = false;
          monster.explosionLife = 0;
          monster.lastBlastAt = millis();
          if (monster.clones) monster.clones = [];
          monster.parasiteUntil = 0;
        }
        gameState = "intro";
        winStartedAt = 0;
        document.getElementById("loading").style.display = "block";
        document.getElementById("loading").textContent = "Press Enter to begin";
      }

      function gotHands(results) {
        hands = results;
      }
    </script>
