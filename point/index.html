<!DOCTYPE html>
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Three.js 建筑粒子自动呼吸动画</title>
    <style>
        body { margin: 0; background-color: #000; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #00d2ff;
            pointer-events: none; text-transform: uppercase; letter-spacing: 2px;
        }
        canvas { display: block; }
    </style>
</head>
<body>

<div id="overlay">
    建筑粒子系统：自动循环模式<br>
    <span style="font-size: 12px; color: #555;">状态：正在提取顶点并生成实时动画...</span>
</div>

<script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

// --- 1. 基础配置 ---
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 3, 10);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;

// --- 2. Shader 材质 ---
const vertexShader = `
    uniform float uTime;
    uniform float uProgress;
    attribute vec3 aRandom;
    varying float vAlpha;

    void main() {
        vec3 pos = position;

        // 1. 基础随机抖动 (噪声)
        float noise = sin(uTime * 2.0 + position.x * 10.0) * 0.01;
        pos += noise;

        // 2. 消散逻辑：跟随 uProgress (0.0 - 1.0)
        // 让粒子沿随机方向飞出，并加入一点向上的漂浮力
        pos += aRandom * uProgress * 5.0;
        pos.y += uProgress * 1.5; 

        vec4 mvPosition = modelViewMatrix * vec4(pos, 1.0);
        
        // 3. 粒子大小计算
        gl_PointSize = (12.0 + 4.0 * sin(uTime + position.y)) * (300.0 / -mvPosition.z);
        gl_Position = projectionMatrix * mvPosition;

        // 4. 透明度：聚合时最亮(1.0)，消散时变淡(0.2)
        vAlpha = 1.0 - (uProgress * 0.8);
    }
`;

const fragmentShader = `
    varying float vAlpha;
    void main() {
        float dist = length(gl_PointCoord - 0.5);
        if(dist > 0.5) discard;
        
        // 核心亮，边缘柔和
        float strength = pow(0.06 / dist, 1.5); 
        // 这里的颜色可以根据喜好调整 (R, G, B)
        gl_FragColor = vec4(0.2, 0.6, 1.0, strength * vAlpha);
    }
`;

// --- 3. 模型处理 ---
let particleSystem;
const loader = new GLTFLoader();

loader.load('point/building.glb', (gltf) => {
    const vertices = [];
    gltf.scene.traverse((child) => {
        if (child.isMesh) {
            const posAttr = child.geometry.attributes.position;
            // 采样间隔：如果你觉得粒子太少，把 3 改成 1 或 2
            for (let i = 0; i < posAttr.count; i += 3) { 
                vertices.push(posAttr.getX(i), posAttr.getY(i), posAttr.getZ(i));
            }
        }
    });

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices, 3));

    // 为每个粒子分配随机飞散方向
    const rndDirections = new Float32Array(vertices.length);
    for (let i = 0; i < vertices.length; i++) {
        rndDirections[i] = (Math.random() - 0.5) * 2.5;
    }
    geometry.setAttribute('aRandom', new THREE.Float32BufferAttribute(rndDirections, 3));

    const material = new THREE.ShaderMaterial({
        uniforms: {
            uTime: { value: 0 },
            uProgress: { value: 0 }
        },
        vertexShader,
        fragmentShader,
        transparent: true,
        blending: THREE.AdditiveBlending,
        depthWrite: false,
    });

    particleSystem = new THREE.Points(geometry, material);

    // 自动对齐到场景中心
    const box = new THREE.Box3().setFromObject(particleSystem);
    const center = box.getCenter(new THREE.Vector3());
    particleSystem.position.sub(center);
    
    scene.add(particleSystem);
}, undefined, (err) => {
    console.error("加载错误：请确认文件名为 building.glb 且在同级目录", err);
});

// --- 4. 动画循环 ---
const clock = new THREE.Clock();

function animate() {
    requestAnimationFrame(animate);
    const t = clock.getElapsedTime();

    if (particleSystem) {
        // 更新时间
        particleSystem.material.uniforms.uTime.value = t;

        // --- 核心变化逻辑 ---
        // 使用 sin 函数产生 -1 到 1 的波动，映射到 0 到 1
        // (Math.sin(t * 0.5) + 1.0) / 2.0; // 这个节奏比较慢
        // 下面这个公式会让它在“完整建筑”状态停留稍久一点
        const rawSin = Math.sin(t * 0.6); 
        const progress = Math.max(0, rawSin); // 只在 sin 为正时消散，负数时保持原状
        
        particleSystem.material.uniforms.uProgress.value = progress;

        // 模型整体低速自转
        particleSystem.rotation.y += 0.002;
    }

    controls.update();
    renderer.render(scene, camera);
}

animate();

// 窗口适配
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
